appId: ru.pvs.desktop
productName: PV-Sistema
copyright: Copyright © 2024 PV-Sistema

extraMetadata:
  main: main.cjs
  version: "1.0.0"

asar: false

directories:
  output: dist-installer
  buildResources: desktop/electron/icons

files:
  - main.cjs
  - preload.cjs
  - dist-electron/**/*
  - node_modules/electron-store/**/*
  - node_modules/conf/**/*
  - node_modules/env-paths/**/*
  - node_modules/dot-prop/**/*
  - node_modules/type-fest/**/*
  - node_modules/semver/**/*
  - node_modules/electron-updater/**/*
  - node_modules/builder-util-runtime/**/*
  - node_modules/fs-extra/**/*
  - node_modules/graceful-fs/**/*
  - node_modules/jsonfile/**/*
  - node_modules/universalify/**/*
  - node_modules/js-yaml/**/*
  - node_modules/argparse/**/*
  - node_modules/lodash/**/*

extraResources:
  - from: desktop/server/dist/python-server.exe
    to: python-server.exe

win:
  target:
    - nsis
  icon: desktop/electron/icons/icon.ico
  fileAssociations:
    - ext: vproj
      name: PV-Sistema Project
      description: PV-Sistema Project File

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: PV-Sistema
  language: "1049"

publish:
  provider: generic
  url: https://updates.pvs.ru/releases/