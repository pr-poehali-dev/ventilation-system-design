appId: ru.pvs.desktop
productName: PV-Sistema
copyright: Copyright © 2024 PV-Sistema

directories:
  output: dist-installer
  buildResources: desktop/electron/icons
  app: .

files:
  - dist-electron/**/*
  - desktop/electron/main.js
  - desktop/electron/preload.js
  - node_modules/**/*
  - "!node_modules/.cache/**/*"
  - "!node_modules/.bin/**/*"
  - "!node_modules/electron/**/*"
  - "!node_modules/electron-builder/**/*"

extraResources:
  - from: desktop/server/dist/python-server.exe
    to: python-server.exe

win:
  target:
    - nsis
  icon: desktop/electron/icons/icon.ico
  fileAssociations:
    - ext: vproj
      name: PV-Sistema Project
      description: Файл проекта PV-Sistema

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: PV-Sistema
  language: "1049"
  installerLanguages:
    - ru

publish:
  provider: generic
  url: https://updates.pvs.ru/releases/
