    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" id="viewport-meta"/>
    <script>
      // На мобильном устройстве сразу применяем десктопный viewport,
      // чтобы приложение загружалось как полная ПК-версия с первого кадра.
      (function() {
        try {
          var w = window.innerWidth || document.documentElement.clientWidth;
          var stubRequested = new URLSearchParams(window.location.search).get('stub') === '1'
            || localStorage.getItem('force-desktop') === '0';
          if (w < 768 && !stubRequested) {
            var vp = document.getElementById('viewport-meta');
            if (vp) {
              var cssW = window.screen.width || w;
              var scale = (cssW / 1280).toFixed(3);
              vp.setAttribute('content', 'width=1280, initial-scale=' + scale + ', minimum-scale=0.1, maximum-scale=10, user-scalable=yes');
            }
          }
        } catch (e) { /* noop */ }
      })();
    </script>

      html, body, #root {
        width: 100%;

      /* ─── Сплеш-экран при запуске ─── */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #ffffff 0%, #eaf4fc 60%, #d2e8f7 100%);
        font-family: 'IBM Plex Sans', 'Segoe UI', Tahoma, sans-serif;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #app-splash.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-splash .splash-logo {
        width: 280px;
        max-width: 80vw;
        height: auto;
        object-fit: contain;
        animation: splashPulse 2.2s ease-in-out infinite;
        filter: drop-shadow(0 6px 20px rgba(14, 99, 176, 0.18));
      }
      #app-splash .splash-title {
        margin-top: 24px;
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #0E3A6E;
      }
      #app-splash .splash-subtitle {
        margin-top: 8px;
        font-size: 14px;
        color: #4a6a8a;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
      #app-splash .splash-progress {
        margin-top: 36px;
        width: 240px;
        height: 3px;
        background: rgba(14, 99, 176, 0.15);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      #app-splash .splash-progress::after {
        content: '';
        position: absolute;
        left: -40%;
        top: 0;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #1FA0E8, #0E63B0, transparent);
        animation: splashBar 1.4s ease-in-out infinite;
      }
      #app-splash .splash-version {
        margin-top: 18px;
        font-size: 12px;
        color: #5a7a9a;
        letter-spacing: 0.4px;
      }
      #app-splash .splash-footer {
        position: absolute;
        bottom: 18px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 11px;
        color: #6b8aa8;
        letter-spacing: 0.3px;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.05); }
      }
      @keyframes splashBar {
        0%   { left: -40%; }
        100% { left: 100%; }
      }
    </style>
