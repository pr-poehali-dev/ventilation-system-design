<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3FA9F5"/>
      <stop offset="100%" stop-color="#0E63B0"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4DB8F5"/>
      <stop offset="100%" stop-color="#0F5BAF"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8AD8F8"/>
      <stop offset="100%" stop-color="#1FA0E8"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="232"/>
    </clipPath>
  </defs>

  <!-- Основной круг -->
  <circle cx="256" cy="256" r="232" fill="url(#circleGrad)"/>

  <!-- Внутреннее содержимое, обрезанное по кругу -->
  <g clip-path="url(#circleClip)">
    <!-- Верхняя «горка» (силуэт холма/горы за каплей) -->
    <path d="M70 250
             C 130 170, 200 165, 245 230
             C 260 250, 270 250, 285 235
             L 285 290
             L 70 290 Z"
          fill="#2D8FD6" opacity="0.85"/>

    <!-- Большая волна (нижняя) -->
    <path d="M40 360
             C 110 310, 180 410, 256 360
             C 332 310, 402 410, 472 360
             L 472 520
             L 40 520 Z"
          fill="url(#waveGrad)"/>

    <!-- Светлый промежуток (белая «прослойка» между волнами) -->
    <path d="M40 330
             C 110 285, 180 380, 256 330
             C 332 285, 402 380, 472 330"
          fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>

    <!-- Капля воды -->
    <path d="M325 130
             C 325 130, 280 200, 280 240
             C 280 270, 305 290, 325 290
             C 345 290, 370 270, 370 240
             C 370 200, 325 130, 325 130 Z"
          fill="url(#dropGrad)"/>
    <!-- Блик на капле -->
    <ellipse cx="312" cy="235" rx="7" ry="18" fill="#FFFFFF" opacity="0.55"/>
  </g>

  <!-- Тонкая внешняя обводка для чёткости на маленьких размерах -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#0A4A8C" stroke-width="4" opacity="0.35"/>
</svg>
